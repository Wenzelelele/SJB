<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merch Bestellung</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0ddd6;
    --border-strong: #c8c4bc;
    --text: #1a1916;
    --muted: #7a776f;
    --accent: #1a1916;
    --accent-bg: #1a1916;
    --accent-text: #f5f4f0;
    --tag-bg: #ece9e2;
    --selected-border: #1a1916;
    --selected-bg: #f0ede6;
    --radius: 8px;
    --radius-lg: 14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--text);
    color: var(--bg);
    padding: 2.5rem 2rem 2rem;
    position: relative;
    overflow: hidden;
  }
  header::after {
    content: 'MERCH';
    position: absolute;
    right: -10px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 7rem;
    font-weight: 500;
    color: rgba(255,255,255,0.06);
    letter-spacing: -4px;
    pointer-events: none;
    user-select: none;
  }
  header h1 {
    font-family: 'DM Mono', monospace;
    font-size: 1.5rem;
    font-weight: 500;
    letter-spacing: -0.5px;
  }
  header p {
    font-size: 0.875rem;
    color: rgba(245,244,240,0.6);
    margin-top: 6px;
  }

  .container { max-width: 680px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .field { margin-bottom: 1.25rem; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block;
    font-size: 0.875rem;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .field input[type=text] {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9375rem;
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.15s;
    outline: none;
  }
  .field input[type=text]:focus { border-color: var(--text); }
  .err { font-size: 0.8rem; color: #c0392b; margin-top: 5px; display: none; }

  /* Product tabs */
  .prod-tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .prod-tab {
    font-size: 0.8125rem;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .prod-tab.active {
    background: var(--accent-bg);
    color: var(--accent-text);
    border-color: var(--accent-bg);
  }

  .prod-panel { display: none; }
  .prod-panel.active { display: block; }

  /* Order items */
  .order-list { display: flex; flex-direction: column; gap: 10px; }
  .order-item {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    background: var(--bg);
    position: relative;
  }

  .item-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .item-field { display: flex; flex-direction: column; gap: 4px; }
  .item-field label { font-size: 0.75rem; color: var(--muted); font-weight: 500; }
  .item-field select {
    padding: 7px 10px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    background: var(--surface);
    color: var(--text);
    outline: none;
    cursor: pointer;
  }
  .item-field.qty { min-width: 70px; }
  .qty-ctrl { display: flex; align-items: center; gap: 0; border: 1px solid var(--border-strong); border-radius: var(--radius); overflow: hidden; background: var(--surface); }
  .qty-ctrl button {
    width: 32px; height: 34px;
    border: none; background: transparent;
    font-size: 1.1rem; cursor: pointer;
    color: var(--text); font-family: 'DM Mono', monospace;
    transition: background 0.1s;
  }
  .qty-ctrl button:hover { background: var(--tag-bg); }
  .qty-ctrl span { font-size: 0.875rem; font-weight: 500; min-width: 28px; text-align: center; font-family: 'DM Mono', monospace; }

  .remove-btn {
    position: absolute; top: 10px; right: 10px;
    width: 24px; height: 24px;
    border: none; background: transparent;
    color: var(--muted); font-size: 1rem;
    cursor: pointer; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    line-height: 1;
  }
  .remove-btn:hover { background: #fde8e8; color: #c0392b; }

  .add-btn {
    margin-top: 10px;
    padding: 8px 14px;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius);
    background: transparent;
    color: var(--muted);
    font-size: 0.8125rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    width: 100%;
    transition: all 0.15s;
  }
  .add-btn:hover { border-color: var(--text); color: var(--text); background: var(--tag-bg); }

  /* Size selector */
  .size-wrap { display: flex; gap: 6px; flex-wrap: wrap; }
  .size-opt {
    padding: 5px 12px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    background: var(--surface);
    transition: all 0.15s;
    font-family: 'DM Mono', monospace;
  }
  .size-opt:hover { border-color: var(--text); }
  .size-opt.active { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent-bg); }

  /* Color dot */
  .color-dot {
    display: inline-block;
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.15);
    margin-right: 6px;
    vertical-align: middle;
  }

  /* Submit */
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent-bg);
    color: var(--accent-text);
    border: none;
    border-radius: var(--radius-lg);
    font-family: 'DM Mono', monospace;
    font-size: 0.9375rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    margin-top: 1rem;
    transition: opacity 0.15s;
  }
  .submit-btn:hover { opacity: 0.85; }

  /* Success */
  #successView { display: none; }
  .success-header {
    background: var(--text);
    color: var(--bg);
    padding: 2.5rem 2rem 2rem;
  }
  .success-header h1 { font-family: 'DM Mono', monospace; font-size: 1.5rem; font-weight: 500; }
  .success-header p { font-size: 0.875rem; color: rgba(245,244,240,0.6); margin-top: 6px; }
  .summary-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  .summary-table th { text-align: left; font-weight: 500; font-size: 0.75rem; color: var(--muted); padding: 6px 0; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; }
  .summary-table td { padding: 8px 0; border-bottom: 1px solid var(--border); vertical-align: top; }
  .summary-table tr:last-child td { border-bottom: none; }
  .reset-btn {
    padding: 10px 20px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 0.8125rem;
    cursor: pointer;
    color: var(--text);
    margin-top: 1rem;
    transition: all 0.15s;
  }
  .reset-btn:hover { background: var(--tag-bg); }

  @media (max-width: 480px) {
    .item-row { gap: 8px; }
    .item-field select { font-size: 0.8125rem; }
  }
</style>
</head>
<body>

<div id="formView">
  <header>
    <h1>Merch-Bestellung</h1>
    <p>Wähle deine Produkte, Farben, Größen und Mengen.</p>
  </header>

  <div class="container">
    <div class="section">
      <div class="section-title">Deine Angaben</div>
      <div class="field">
        <label for="nameInput">Name *</label>
        <input type="text" id="nameInput" placeholder="Vor- und Nachname" />
        <div class="err" id="nameErr">Bitte gib deinen Namen ein.</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Produkte</div>
      <div class="prod-tabs">
        <button class="prod-tab active" onclick="switchTab('longsleeve', this)">Longsleeve</button>
        <button class="prod-tab" onclick="switchTab('sportshirt', this)">Sport-Shirt</button>
        <button class="prod-tab" onclick="switchTab('zipper', this)">Zipper</button>
      </div>

      <!-- LONGSLEEVE -->
      <div class="prod-panel active" id="panel-longsleeve">
        <div class="order-list" id="list-longsleeve"></div>
        <button class="add-btn" onclick="addItem('longsleeve')">+ Weiteres Longsleeve hinzufügen</button>
        <div class="err" id="err-longsleeve"></div>
      </div>

      <!-- SPORT-SHIRT -->
      <div class="prod-panel" id="panel-sportshirt">
        <div class="order-list" id="list-sportshirt"></div>
        <button class="add-btn" onclick="addItem('sportshirt')">+ Weiteres Sport-Shirt hinzufügen</button>
        <div class="err" id="err-sportshirt"></div>
      </div>

      <!-- ZIPPER -->
      <div class="prod-panel" id="panel-zipper">
        <div class="order-list" id="list-zipper"></div>
        <button class="add-btn" onclick="addItem('zipper')">+ Weiteren Zipper hinzufügen</button>
        <div class="err" id="err-zipper"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Anmerkungen</div>
      <div class="field">
        <input type="text" id="notesInput" placeholder="Sonderwünsche, Fragen …" />
      </div>
    </div>

    <div class="err" id="globalErr" style="font-size:0.9rem; margin-bottom:0.5rem;"></div>
    <button class="submit-btn" onclick="submitForm()">BESTELLUNG ABSENDEN →</button>
  </div>
</div>

<div id="successView">
  <div class="success-header">
    <h1>Bestellung eingegangen ✓</h1>
    <p>Danke! Deine Auswahl wurde gespeichert.</p>
  </div>
  <div class="container">
    <div class="section">
      <div class="section-title">Zusammenfassung</div>
      <table class="summary-table">
        <thead><tr><th>Produkt</th><th>Farbe / Stick</th><th>Größe</th><th>Menge</th></tr></thead>
        <tbody id="summaryBody"></tbody>
      </table>
      <p id="summaryNotes" style="margin-top:1rem; font-size:0.875rem; color:#7a776f;"></p>
    </div>
    <button class="reset-btn" onclick="resetForm()">← Neue Eingabe</button>
  </div>
</div>

<script>
const SIZES = ['XS','S','M','L','XL','XXL'];

const COLOR_HEX = {
  'Red': '#c0392b', 'Red Brown': '#6b2737', 'Heritage Brown': '#9b5e3e',
  'Khaki': '#5c6b3a', 'Natural Raw': '#e8dfc4', 'Glazed Green': '#2d5a4a',
  'Worker Blue': '#3060c0', 'French Navy': '#1b2a4a', 'Cold Heather Gray': '#c8cdd4',
  'Heather Gray': '#9ea3a8', 'White': '#f5f5f5', 'Black': '#1a1916',
  'Bordeaux': '#6b1a2a', 'Dusty Yellow': '#d4c46a', 'Green': '#27803a',
  'Military': '#6b7040', 'Sapphire': '#1a8abf', 'Royal': '#2f50c0',
  'Navy': '#1b2a4a', 'Dusty Indigo': '#5a6b8a', 'Dusty Purple': '#8a7ab0',
  'Pink': '#e0406a',
  'Ash Heather': '#c8c4bc', 'Convoy Grey': '#7a8080', 'Dark Grey': '#4a4a4a',
  'Deep Blue': '#1a2e5a', 'Green Marble Heather': '#6a7a60', 'Green Olive': '#5a6040',
  'Royal Blue': '#2f50c0', 'Sage': '#8aab90', 'Sky Blue': '#7ab4d4',
  'Snow Grey': '#c4c8cc', 'True Indigo': '#2a2a6a', 'Wine': '#5a1a2a',
};

// Longsleeve: color -> stick options
const LS_COLORS = {
  'Red': ['Weiß'], 'Red Brown': ['Weiß'], 'Heritage Brown': ['Weiß'],
  'Khaki': ['Weiß'], 'Glazed Green': ['Weiß'], 'Worker Blue': ['Weiß'],
  'French Navy': ['Weiß'], 'Heather Gray': ['Weiß'], 'Black': ['Weiß'],
  'Natural Raw': ['Navy'], 'Cold Heather Gray': ['Navy'], 'White': ['Navy'],
};

// Sport-Shirt: no stick choice
const SS_COLORS = ['Red','Bordeaux','Green','Military','Sapphire','Royal','Navy','Dusty Indigo','Dusty Purple','Pink','White','Black'];

// Zipper: color -> stick options
const ZP_COLORS = {
  'Convoy Grey': ['Weiß'], 'Dark Grey': ['Weiß'], 'Deep Blue': ['Weiß'],
  'Green Marble Heather': ['Weiß'], 'Green Olive': ['Weiß'], 'Navy': ['Weiß'],
  'Royal Blue': ['Weiß'], 'Sage': ['Weiß'], 'True Indigo': ['Weiß'], 'Wine': ['Weiß'],
  'White': ['Navy'],
  'Sky Blue': ['Weiß','Navy'], 'Snow Grey': ['Weiß','Navy'], 'Ash Heather': ['Weiß','Navy'],
};

let counters = { longsleeve: 0, sportshirt: 0, zipper: 0 };

function colorDot(color) {
  const hex = COLOR_HEX[color] || '#ccc';
  return `<span class="color-dot" style="background:${hex}"></span>`;
}

function buildColorOptions(colorsObj, isObj) {
  const colors = isObj ? Object.keys(colorsObj) : colorsObj;
  return colors.map(c => `<option value="${c}">${c}</option>`).join('');
}

function getStickOpts(type, color) {
  if (type === 'longsleeve') return LS_COLORS[color] || [];
  if (type === 'zipper') return ZP_COLORS[color] || [];
  return [];
}

function addItem(type) {
  const id = ++counters[type];
  const itemId = `${type}-${id}`;
  const list = document.getElementById(`list-${type}`);

  const div = document.createElement('div');
  div.className = 'order-item';
  div.id = itemId;
  div.innerHTML = buildItemHTML(type, itemId, id);
  list.appendChild(div);
  updateStickSelect(type, itemId);
}

function buildItemHTML(type, itemId, num) {
  let colorOpts = '';
  if (type === 'longsleeve') colorOpts = buildColorOptions(LS_COLORS, true);
  else if (type === 'sportshirt') colorOpts = buildColorOptions(SS_COLORS, false);
  else colorOpts = buildColorOptions(ZP_COLORS, true);

  const hasStick = type !== 'sportshirt';
  const stickField = hasStick ? `
    <div class="item-field">
      <label>Stickerei</label>
      <select id="stick-${itemId}" onchange="">
        <option value="">– wählen –</option>
      </select>
    </div>` : '';

  const sizes = SIZES.map(s =>
    `<span class="size-opt" data-size="${s}" onclick="selectSize('${itemId}', this)">${s}</span>`
  ).join('');

  return `
    <button class="remove-btn" onclick="removeItem('${itemId}')" title="Entfernen">✕</button>
    <div class="item-row">
      <div class="item-field" style="flex:1; min-width:140px;">
        <label>Farbe</label>
        <select id="color-${itemId}" onchange="onColorChange('${type}','${itemId}')">
          <option value="">– wählen –</option>
          ${colorOpts}
        </select>
      </div>
      ${stickField}
      <div class="item-field qty">
        <label>Menge</label>
        <div class="qty-ctrl">
          <button onclick="changeQty('${itemId}',-1)">−</button>
          <span id="qty-${itemId}">1</span>
          <button onclick="changeQty('${itemId}',1)">+</button>
        </div>
      </div>
    </div>
    <div style="margin-top:10px;">
      <div style="font-size:0.75rem; color:var(--muted); font-weight:500; margin-bottom:6px;">Größe</div>
      <div class="size-wrap" id="sizes-${itemId}">${sizes}</div>
    </div>
    <input type="hidden" id="selsize-${itemId}" value="" />
  `;
}

function onColorChange(type, itemId) {
  if (type !== 'sportshirt') updateStickSelect(type, itemId);
}

function updateStickSelect(type, itemId) {
  const colorEl = document.getElementById(`color-${itemId}`);
  const stickEl = document.getElementById(`stick-${itemId}`);
  if (!colorEl || !stickEl) return;
  const color = colorEl.value;
  const opts = getStickOpts(type, color);
  stickEl.innerHTML = opts.length === 0
    ? '<option value="">– erst Farbe wählen –</option>'
    : (opts.length === 1
        ? `<option value="${opts[0]}">Logo ${opts[0]}</option>`
        : '<option value="">– wählen –</option>' + opts.map(o => `<option value="${o}">Logo ${o}</option>`).join(''));
}

function selectSize(itemId, el) {
  document.querySelectorAll(`#sizes-${itemId} .size-opt`).forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(`selsize-${itemId}`).value = el.dataset.size;
}

function changeQty(itemId, delta) {
  const el = document.getElementById(`qty-${itemId}`);
  el.textContent = Math.max(1, parseInt(el.textContent) + delta);
}

function removeItem(itemId) {
  document.getElementById(itemId)?.remove();
}

function switchTab(type, btn) {
  document.querySelectorAll('.prod-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.prod-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`panel-${type}`).classList.add('active');
}

function getItems(type) {
  const items = [];
  document.querySelectorAll(`#list-${type} .order-item`).forEach(el => {
    const itemId = el.id;
    const color = document.getElementById(`color-${itemId}`)?.value || '';
    const stickEl = document.getElementById(`stick-${itemId}`);
    const stick = stickEl ? stickEl.value : '';
    const qty = parseInt(document.getElementById(`qty-${itemId}`)?.textContent || '1');
    const size = document.getElementById(`selsize-${itemId}`)?.value || '';
    items.push({ itemId, color, stick, qty, size });
  });
  return items;
}

async function submitForm() {
  let ok = true;
  const name = document.getElementById('nameInput').value.trim();
  document.getElementById('nameErr').style.display = name ? 'none' : 'block';
  if (!name) ok = false;

  const allItems = [];
  const typeLabel = { longsleeve: 'Longsleeve', sportshirt: 'Sport-Shirt', zipper: 'Zipper' };
  ['longsleeve','sportshirt','zipper'].forEach(type => {
    const items = getItems(type);
    items.forEach(item => {
      if (!item.color) { ok = false; }
      if (type !== 'sportshirt' && !item.stick) { ok = false; }
      if (!item.size) { ok = false; }
      if (item.color) allItems.push({ type, ...item });
    });
  });

  const globalErr = document.getElementById('globalErr');
  if (!ok) {
    globalErr.textContent = 'Bitte füll alle Felder aus (Farbe, Stickerei, Größe) und wähle mindestens ein Produkt.';
    globalErr.style.display = 'block';
    return;
  }
  if (allItems.length === 0) {
    globalErr.textContent = 'Bitte füge mindestens ein Produkt hinzu.';
    globalErr.style.display = 'block';
    return;
  }
  globalErr.style.display = 'none';

  // Build readable summary for Formspree email
  const notes = document.getElementById('notesInput').value.trim();
  const lines = allItems.map(item => {
    const stickTxt = item.stick ? `, Logo ${item.stick}` : '';
    return `• ${typeLabel[item.type]}: ${item.color}${stickTxt}, Größe ${item.size}, ${item.qty}×`;
  });
  const bestellung = lines.join('\n');

  // Disable button while sending
  const btn = document.querySelector('.submit-btn');
  btn.textContent = 'Wird gesendet …';
  btn.disabled = true;

  try {
    const res = await fetch('https://formspree.io/f/mdajyrpv', {
      method: 'POST',
      headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name,
        bestellung,
        anmerkung: notes || '–',
      })
    });

    if (!res.ok) throw new Error('Fehler beim Senden');

    // Show success screen
    const tbody = document.getElementById('summaryBody');
    tbody.innerHTML = `<tr><td style="font-weight:500; padding-bottom:8px;">${name}</td><td></td><td></td><td></td></tr>`;
    allItems.forEach(item => {
      const stickTxt = item.stick ? ` · Logo ${item.stick}` : '';
      tbody.innerHTML += `<tr>
        <td>${typeLabel[item.type]}</td>
        <td>${colorDot(item.color)}${item.color}${stickTxt}</td>
        <td>${item.size}</td>
        <td>${item.qty}×</td>
      </tr>`;
    });
    const notesEl = document.getElementById('summaryNotes');
    notesEl.textContent = notes ? `Anmerkung: ${notes}` : '';

    document.getElementById('formView').style.display = 'none';
    document.getElementById('successView').style.display = 'block';
    window.scrollTo(0, 0);

  } catch(e) {
    globalErr.textContent = 'Beim Senden ist ein Fehler aufgetreten. Bitte versuch es nochmal.';
    globalErr.style.display = 'block';
    btn.textContent = 'BESTELLUNG ABSENDEN →';
    btn.disabled = false;
  }
}

function resetForm() {
  document.getElementById('nameInput').value = '';
  document.getElementById('notesInput').value = '';
  ['longsleeve','sportshirt','zipper'].forEach(type => {
    document.getElementById(`list-${type}`).innerHTML = '';
  });
  counters = { longsleeve: 0, sportshirt: 0, zipper: 0 };
  document.getElementById('formView').style.display = 'block';
  document.getElementById('successView').style.display = 'none';
  window.scrollTo(0, 0);
}

// Start with one item per product
addItem('longsleeve');
addItem('sportshirt');
addItem('zipper');
</script>
</body>
</html>
